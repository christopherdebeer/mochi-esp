# Deploy the static site under `site/` to GitHub Pages.
#
# The site is the project hub (landing page + browser tools like
# SPRITE·FORGE + links to docs/releases). It is intentionally
# separate from the firmware: pure static HTML/CSS, no build step —
# the tools pull React/Tailwind from CDNs at runtime, so there is
# nothing to compile here.
#
# Pages source must be set to "GitHub Actions" in the repo settings
# (Settings → Pages → Build and deployment → Source) for this to
# publish. Runs on pushes to main that touch the site, and can be
# kicked manually via workflow_dispatch.
name: pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
