// ───────────────────────────── primitives ─────────────────────────────

function Card({ title, num, children, right }) {
  return (
    <section className="border border-zinc-800 bg-zinc-900/40">
      <header className="flex items-center justify-between border-b border-zinc-800 px-3 py-2">
        <h2 className="pixel text-[11px] text-teal-300">
          <span className="text-zinc-600">{num} ▸ </span>{title}
        </h2>
        {right}
      </header>
      <div className="p-3 space-y-2">{children}</div>
    </section>
  );
}

function Row({ label, children, hint }) {
  return (
    <div className="space-y-1">
      <div className="flex items-center justify-between text-[11px]">
        <span className="text-zinc-400 uppercase tracking-wider">{label}</span>
        {hint && <span className="text-zinc-600 text-[10px]">{hint}</span>}
      </div>
      {children}
    </div>
  );
}

function Stepper({ value, onChange, min = 1, max = 99, suffix }) {
  return (
    <div className="flex items-stretch border border-zinc-700 w-fit">
      <button
        onClick={() => onChange(Math.max(min, value - 1))}
        className="px-3 text-zinc-400 hover:bg-zinc-800 active:bg-teal-300/20 select-none"
        aria-label="decrement"
      >−</button>
      <input
        type="number"
        value={value}
        onChange={(e) => {
          const n = parseInt(e.target.value);
          if (!isNaN(n)) onChange(Math.max(min, Math.min(max, n)));
        }}
        className="w-14 bg-transparent text-center text-sm text-teal-300 outline-none [&::-webkit-inner-spin-button]:appearance-none"
      />
      <button
        onClick={() => onChange(Math.min(max, value + 1))}
        className="px-3 text-zinc-400 hover:bg-zinc-800 active:bg-teal-300/20 select-none"
        aria-label="increment"
      >+</button>
      {suffix && <span className="px-2 self-center text-[10px] text-zinc-600">{suffix}</span>}
    </div>
  );
}

function Slider({ value, onChange, min = 0, max = 100, suffix = '' }) {

        min={min}

}

}

// ───────────────────────────── pixel conversion ─────────────────────────────

const luma = (r, g, b) => 0.299 * r + 0.587 * g + 0.114 * b;

// 4×4 Bayer matrix, normalized to 0..15
const BAYER_4 = [
  [0, 8, 2, 10],
  [12, 4, 14, 6],
  [3, 11, 1, 9],
  [15, 7, 13, 5],
];
// 8×8 Bayer (standard recursive expansion), 0..63
const BAYER_8 = [
  [ 0, 32,  8, 40,  2, 34, 10, 42],
  [48, 16, 56, 24, 50, 18, 58, 26],
  [12, 44,  4, 36, 14, 46,  6, 38],
  [60, 28, 52, 20, 62, 30, 54, 22],
  [ 3, 35, 11, 43,  1, 33,  9, 41],
  [51, 19, 59, 27, 49, 17, 57, 25],
  [15, 47,  7, 39, 13, 45,  5, 37],
  [63, 31, 55, 23, 61, 29, 53, 21],
];

// Build an [w*h] luma array (Float32) honoring invert.
function lumaBuffer(imgData, invert) {
  const { width: w, height: h, data: src } = imgData;
  const buf = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) {
    let r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
    if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
    buf[i] = luma(r, g, b);
  }
  return buf;
}

// Apply effect; returns Uint8Array(w*h) of 0/255 binary luma.
function applyEffect(imgData, effect, threshold, invert) {
  const { width: w, height: h } = imgData;
  const N = w * h;
  const buf = lumaBuffer(imgData, invert);
  const out = new Uint8Array(N);

  if (effect.kind === 'fs' || effect.kind === 'atkinson') {
    const serp = effect.serpentine;
    for (let y = 0; y < h; y++) {
      const ltr = !serp || (y & 1) === 0;
      const xStart = ltr ? 0 : w - 1;
      const xEnd = ltr ? w : -1;
      const xStep = ltr ? 1 : -1;
      for (let x = xStart; x !== xEnd; x += xStep) {
        const i = y * w + x;
        const old = buf[i];
        const nv = old < threshold ? 0 : 255;
        out[i] = nv;
        const err = old - nv;
        if (effect.kind === 'fs') {
          // Floyd-Steinberg (mirror x-offsets when scanning right-to-left)
          const d = xStep;
          if (x + d >= 0 && x + d < w)         buf[i + d]         += err * (7 / 16);
          if (y + 1 < h) {
            if (x - d >= 0 && x - d < w)       buf[i + w - d]     += err * (3 / 16);
                                               buf[i + w]         += err * (5 / 16);
            if (x + d >= 0 && x + d < w)       buf[i + w + d]     += err * (1 / 16);
          }
        } else {
          // Atkinson (passes only 6/8 of the error → higher contrast)
          const e8 = err / 8;
          const d = xStep;
          if (x + d >= 0 && x + d < w)         buf[i + d]         += e8;
          if (x + 2 * d >= 0 && x + 2 * d < w) buf[i + 2 * d]     += e8;
          if (y + 1 < h) {
            if (x - d >= 0 && x - d < w)       buf[i + w - d]     += e8;
                                               buf[i + w]         += e8;
            if (x + d >= 0 && x + d < w)       buf[i + w + d]     += e8;
          }
          if (y + 2 < h)                       buf[i + 2 * w]     += e8;
        }
      }
    }
    return out;
  }

  if (effect.kind === 'bayer4' || effect.kind === 'bayer8') {
    const M = effect.kind === 'bayer4' ? BAYER_4 : BAYER_8;
    const n = M.length;
    const scale = 255 / (n * n);
    // Strength: how strongly the matrix modulates threshold (0..1)
    const s = effect.strength;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        const m = (M[y % n][x % n] + 0.5) * scale;       // 0..255 dither value
        const t = threshold + (m - 128) * s;             // shifted threshold
        out[i] = buf[i] < t ? 0 : 255;
      }
    }
    return out;
  }

  if (effect.kind === 'screen') {
    const rad = (effect.angle * Math.PI) / 180;
    const cs = Math.cos(rad), sn = Math.sin(rad);
    const sp = Math.max(1, effect.spacing);
    const contrast = effect.contrast; // 0..1, how aggressive the screen is
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        // Project onto line-normal axis
        const u = x * cs + y * sn;
        // Triangle wave in [0,1] with period `sp`
        const phase = ((u % sp) + sp) % sp;
        const tri = 1 - Math.abs(phase / sp - 0.5) * 2;  // 0 at edges, 1 in middle
        // Mix screen value with fixed threshold for control
        const screenT = tri * 255;
        const t = threshold * (1 - contrast) + screenT * contrast;
        out[i] = buf[i] < t ? 0 : 255;
      }
    }
    return out;
  }

  // 'none' — simple threshold (used only when effect explicitly requests binary)
  for (let i = 0; i < N; i++) out[i] = buf[i] < threshold ? 0 : 255;
  return out;
}

// Per-pixel opacity (1 = opaque, 0 = transparent) for a mochi-esp
// cell, shared between the preview path and the binary export. Returns
// null when masking is disabled (every pixel opaque) so callers can
// take the cheaper non-masked branch.
function buildOpacityBuffer(imgData, { maskSource, chromaHex, chromaTol, paperStroke }) {
  if (!maskSource || maskSource === 'none') return null;
  const { width: w, height: h, data: src } = imgData;
  const N = w * h;

  let chromaR = 0, chromaG = 0, chromaB = 0, chromaOK = false;
  if (maskSource === 'chroma' && typeof chromaHex === 'string') {
    const m = chromaHex.replace('#', '').match(/^([0-9a-fA-F]{6})$/);
    if (m) {
      const v = parseInt(m[1], 16);
      chromaR = (v >> 16) & 0xff;
      chromaG = (v >>  8) & 0xff;
      chromaB =  v        & 0xff;
      chromaOK = true;
    }
  }
  const tol = Math.max(0, Math.min(255, chromaTol | 0));

  const opaque = new Uint8Array(N);
  for (let i = 0; i < N; i++) {
    if (maskSource === 'alpha') {
      opaque[i] = src[i * 4 + 3] >= 128 ? 1 : 0;
    } else if (maskSource === 'white') {
      const r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
      opaque[i] = (r > 240 && g > 240 && b > 240) ? 0 : 1;
    } else if (maskSource === 'chroma' && chromaOK) {
      const r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
      const dr = Math.abs(r - chromaR);
      const dg = Math.abs(g - chromaG);
      const db = Math.abs(b - chromaB);
      const d = dr > dg ? (dr > db ? dr : db) : (dg > db ? dg : db);
      opaque[i] = d <= tol ? 0 : 1;
    } else {
      opaque[i] = 1;
    }
  }

  // Optional 1-px paper stroke: every transparent pixel touching an
  // opaque 8-neighbour becomes opaque. Cell-bounded; mirrors
  // packCellMochi exactly so the preview matches the export.
  if (paperStroke) {
    const grow = new Uint8Array(N);
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        if (opaque[i]) continue;
        let touch = false;
        for (let dy = -1; dy <= 1 && !touch; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
            if (opaque[ny * w + nx]) { touch = true; break; }
          }
        }
        if (touch) grow[i] = 1;
      }
    }
    for (let i = 0; i < N; i++) if (grow[i]) opaque[i] = 1;
  }

  return opaque;
}

// Renders a preview ImageData reflecting both effect and target format.
// `mask` (optional) is a per-pixel opacity buffer from
// buildOpacityBuffer; transparent pixels render with alpha=0 so the
// page's checker background reads through, mirroring the mochi-esp
// device's two-plane composite.
function convertPreview(imgData, format, threshold, invert, effect, mask) {
  const { width: w, height: h, data: src } = imgData;
  const out = new ImageData(w, h);
  const dst = out.data;
  const useEffect = effect && effect.kind !== 'none';

  // Effects always produce binary; preview as black-on-white.
  if (useEffect) {
    const bin = applyEffect(imgData, effect, threshold, invert);
    for (let i = 0; i < w * h; i++) {
      const v = bin[i];
      dst[i * 4] = v; dst[i * 4 + 1] = v; dst[i * 4 + 2] = v;
      dst[i * 4 + 3] = (mask && !mask[i]) ? 0 : 255;
    }
    return out;
  }

  for (let i = 0; i < w * h; i++) {
    let r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
    if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
    if (format === '1bpp') {
      const v = luma(r, g, b) < threshold ? 0 : 255;
      dst[i * 4] = v; dst[i * 4 + 1] = v; dst[i * 4 + 2] = v;
    } else if (format === 'gray8') {
      const v = Math.round(luma(r, g, b));
      dst[i * 4] = v; dst[i * 4 + 1] = v; dst[i * 4 + 2] = v;
    } else {
      // Simulate RGB565 quantisation
      const r5 = r >> 3, g6 = g >> 2, b5 = b >> 3;
      dst[i * 4] = (r5 << 3) | (r5 >> 2);
      dst[i * 4 + 1] = (g6 << 2) | (g6 >> 4);
      dst[i * 4 + 2] = (b5 << 3) | (b5 >> 2);
    }
    dst[i * 4 + 3] = (mask && !mask[i]) ? 0 : 255;
  }
  return out;
}

function packPixels(imgData, format, threshold, invert, effect) {
  const { width: w, height: h, data: src } = imgData;
  const N = w * h;
  const useEffect = effect && effect.kind !== 'none';

  // Pre-binarized path: every format renders the same black/white image.
  if (useEffect) {
    const bin = applyEffect(imgData, effect, threshold, invert);
    if (format === '1bpp') {
      const out = new Uint8Array(Math.ceil(N / 8));
      for (let i = 0; i < N; i++) {
        // Convention: bit=1 means "ink" (dark pixel)
        if (bin[i] === 0) out[i >> 3] |= 0x80 >> (i & 7);
      }
      return out;
    }
    if (format === 'gray8') return bin;  // already 0/255
    // rgb565: black (0x0000) or white (0xFFFF)
    const out = new Uint8Array(N * 2);
    for (let i = 0; i < N; i++) {
      const v = bin[i] === 0 ? 0x0000 : 0xFFFF;
      out[i * 2] = v & 0xff;
      out[i * 2 + 1] = (v >> 8) & 0xff;
    }
    return out;
  }

  if (format === 'rgb565') {
    const out = new Uint8Array(N * 2);
    for (let i = 0; i < N; i++) {
      let r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
      if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
      const v = ((r >> 3) << 11) | ((g >> 2) << 5) | (b >> 3);
      out[i * 2] = v & 0xff;
      out[i * 2 + 1] = (v >> 8) & 0xff;
    }
    return out;
  }
  if (format === 'gray8') {
    const out = new Uint8Array(N);
    for (let i = 0; i < N; i++) {
      let r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
      if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
      out[i] = Math.round(luma(r, g, b));
    }
    return out;
  }
  // 1bpp, MSB-first, row-major (bit=1 → ink)
  const out = new Uint8Array(Math.ceil(N / 8));
  for (let i = 0; i < N; i++) {
    let r = src[i * 4], g = src[i * 4 + 1], b = src[i * 4 + 2];
    if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
    if (luma(r, g, b) < threshold) {
      out[i >> 3] |= 0x80 >> (i & 7);
    }
  }
  return out;
}

// ───────────────────────── mochi-esp native pack ─────────────────────────
//
// The device wire format (eink-pet:design/05-sprite-format.md) is the
// OPPOSITE bit convention from the generic SPRT pack and carries a
// second mask plane for transparency:
//   ink  plane: bit 0 = ink/black,  bit 1 = paper/white
//   mask plane: bit 0 = opaque,     bit 1 = transparent (show scene)
// Both planes MSB-first, row-major, rows byte-aligned at ceil(w/8).
//
// Each cell is encoded byte-identical to a /devsprite/cell response:
// an 8-byte header (w u16 BE, h u16 BE, flags u8, 3 reserved) followed
// by the ink plane then the mask plane. That makes a bundled cell and
// a fetched cell the same bytes — see design/13-build-time-asset-packs.md.

// Per-pixel ink (dark) decision shared with the preview/effect path.
function inkDarkBuffer(imgData, threshold, invert, effect) {
  const N = imgData.width * imgData.height;
  if (effect && effect.kind !== 'none') {
    const bin = applyEffect(imgData, effect, threshold, invert); // 0/255
    const out = new Uint8Array(N);
    for (let i = 0; i < N; i++) out[i] = bin[i] === 0 ? 1 : 0;
    return out;
  }
  const buf = lumaBuffer(imgData, invert);
  const out = new Uint8Array(N);
  for (let i = 0; i < N; i++) out[i] = buf[i] < threshold ? 1 : 0;
  return out;
}

// Encode one cell to the device 2-plane format. Returns Uint8Array
// (8-byte header + ink plane + mask plane).
function packCellMochi(imgData, { threshold, invert, effect, maskSource, paperStroke, chromaHex, chromaTol }) {
  const w = imgData.width, h = imgData.height;
  const N = w * h;
  const rowBytes = (w + 7) >> 3;
  const planeBytes = rowBytes * h;

  const isInk = inkDarkBuffer(imgData, threshold, invert, effect);

  // Opacity per pixel: 1 = opaque, 0 = transparent. We compute the
  // pre-stroke buffer first so we can identify stroke pixels (those
  // newly opaque after the grow) and stamp them as paper in the ink
  // plane — that's what gives the halo around the silhouette.
  const baseBuf  = buildOpacityBuffer(imgData, { maskSource, chromaHex, chromaTol, paperStroke: false });
  const finalBuf = paperStroke
    ? buildOpacityBuffer(imgData, { maskSource, chromaHex, chromaTol, paperStroke: true })
    : baseBuf;
  const opaque = finalBuf || new Uint8Array(N).fill(1);
  if (paperStroke && baseBuf && finalBuf) {
    for (let i = 0; i < N; i++) {
      if (finalBuf[i] && !baseBuf[i]) isInk[i] = 0;
    }
  }

  const ink = new Uint8Array(planeBytes);   // 0x00 = all ink; set bit → paper
  const mask = new Uint8Array(planeBytes);  // 0x00 = all opaque; set bit → transparent
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const bytePos = y * rowBytes + (x >> 3);
      const bit = 0x80 >> (x & 7);
      const transparent = !opaque[i];
      // Transparent pixels carry paper in the ink plane by convention.
      const inkBlack = !transparent && isInk[i];
      if (!inkBlack) ink[bytePos] |= bit;     // paper(1) where not black
      if (transparent) mask[bytePos] |= bit;  // transparent(1)
    }
  }

  const out = new Uint8Array(8 + planeBytes * 2);
  out[0] = (w >> 8) & 0xff; out[1] = w & 0xff;   // width BE
  out[2] = (h >> 8) & 0xff; out[3] = h & 0xff;   // height BE
  out[4] = 0x01;                                  // flags: mask present
  // 5..7 reserved (zero)
  out.set(ink, 8);
  out.set(mask, 8 + planeBytes);
  return out;
}

const imageDataToURL = (imgData) => {
  const c = document.createElement('canvas');
  c.width = imgData.width;
  c.height = imgData.height;
  c.getContext('2d').putImageData(imgData, 0, 0);
  return c.toDataURL();
};

// Build a sheet canvas of processed sprites laid out in a tight grid.
// `hits` is an array of arrays of {x,y,w,h,name} in normalized coords.
function buildSheetCanvas(sprites, format, threshold, invert, effect, opts = {}) {
  if (!sprites || sprites.length === 0) return null;
  const {
    cols = 8,
    gap = 2,
    padding = 8,
    hits = null,
    drawHits = true,
    drawBorders = true,
    drawIndices = false,
    bg = '#ffffff',
    masks = null,           // optional per-sprite opacity buffers (mochi only)
    checker = false,        // when true, paint a checker behind cells so
                            // transparent pixels are obvious
  } = opts;
  const sw = sprites[0].width, sh = sprites[0].height;
  const N = sprites.length;
  const ncols = Math.max(1, Math.min(cols, N));
  const nrows = Math.ceil(N / ncols);
  const W = padding * 2 + ncols * sw + (ncols - 1) * gap;
  const H = padding * 2 + nrows * sh + (nrows - 1) * gap;

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  if (checker) {
    // 8-px checker matching the preview thumbnails' page styling.
    const block = 8;
    for (let y = 0; y < H; y += block) {
      for (let x = 0; x < W; x += block) {
        ctx.fillStyle = (((x / block) + (y / block)) & 1) ? '#27272a' : '#18181b';
        ctx.fillRect(x, y, block, block);
      }
    }
  } else {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
  }

  // Pass 1: pixel data. drawImage respects alpha so masked sprites
  // composite onto the checker; we route through a 1-cell scratch
  // canvas so putImageData → drawImage keeps things cheap.
  const scratch = document.createElement('canvas');
  scratch.width = sw; scratch.height = sh;
  const sctx = scratch.getContext('2d');
  for (let i = 0; i < N; i++) {
    const col = i % ncols;
    const row = Math.floor(i / ncols);
    const x = padding + col * (sw + gap);
    const y = padding + row * (sh + gap);
    const processed = convertPreview(sprites[i], format, threshold, invert, effect,
                                     masks ? masks[i] : null);
    sctx.clearRect(0, 0, sw, sh);
    sctx.putImageData(processed, 0, 0);
    ctx.drawImage(scratch, x, y);
  }

  // Pass 2: cell borders. Makes empty/all-white sprites visually distinguishable.
  if (drawBorders) {
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < N; i++) {
      const col = i % ncols;
      const row = Math.floor(i / ncols);
      const x = padding + col * (sw + gap);
      const y = padding + row * (sh + gap);
      ctx.strokeRect(x - 0.5, y - 0.5, sw + 1, sh + 1);
    }
  }

  // Pass 3: hit overlays.
  if (drawHits && hits) {
    for (let i = 0; i < N; i++) {
      const hs = hits[i];
      if (!hs || hs.length === 0) continue;
      const col = i % ncols;
      const row = Math.floor(i / ncols);
      const x = padding + col * (sw + gap);
      const y = padding + row * (sh + gap);
      for (const h of hs) {
        const hx = Math.round(h.x * sw);
        const hy = Math.round(h.y * sh);
        const hw = Math.max(1, Math.round(h.w * sw));
        const hh = Math.max(1, Math.round(h.h * sh));
        ctx.fillStyle = 'rgba(244,63,94,0.18)';
        ctx.fillRect(x + hx, y + hy, hw, hh);
        ctx.strokeStyle = 'rgba(244,63,94,0.9)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + hx + 0.5, y + hy + 0.5, hw - 1, hh - 1);
      }
    }
  }

  // Pass 4: cell indices (debug overlay).
  if (drawIndices) {
    const fontSize = Math.max(8, Math.round(Math.min(sw, sh) / 4));
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.textBaseline = 'top';
    for (let i = 0; i < N; i++) {
      const col = i % ncols;
      const row = Math.floor(i / ncols);
      const x = padding + col * (sw + gap);
      const y = padding + row * (sh + gap);
      const txt = String(i);
      const tw = ctx.measureText(txt).width + 4;
      ctx.fillStyle = 'rgba(20,184,166,0.9)';
      ctx.fillRect(x, y, tw, fontSize + 2);
      ctx.fillStyle = '#fff';
      ctx.fillText(txt, x + 2, y + 1);
    }
  }

  return canvas;
}

// Make a label valid as a C identifier prefix.
function cIdent(s) {
  if (!s) return 'sprite';
  let out = s.replace(/[^a-zA-Z0-9_]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
  if (/^\d/.test(out)) out = '_' + out;
  return out.toUpperCase() || 'SPRITE';
}

// ───────────────────────────── C parser ─────────────────────────────

const C_PARSER = `// sprite_pack.h — ESP32 / Arduino sprite-pack reader
// Pack format produced by SPRITE·FORGE v1
#pragma once
#include <stdint.h>
#include <string.h>

#define SPRT_MAGIC "SPRT"

enum {
  SPRT_FORMAT_1BPP   = 0,  // MSB-first, row-major; ceil(w*h/8) bytes
  SPRT_FORMAT_GRAY8  = 1,  // 1 byte per pixel
  SPRT_FORMAT_RGB565 = 2,  // 2 bytes per pixel, little-endian
};

typedef struct {
  uint8_t        version;
  uint8_t        format;       // see enum above
  uint16_t       width;
  uint16_t       height;
  uint16_t       count;
  uint8_t        label_len;
  const uint8_t *base;         // pointer to first sprite entry
  size_t         pixel_bytes;  // bytes of pixel data per sprite
  size_t         stride;       // label_len + pixel_bytes (entry size)
} sprt_pack_t;

// Returns 0 on success, negative on error. \`data\` must remain valid
// for the lifetime of the pack (use PROGMEM, embedded data, or PSRAM).
static inline int sprt_open(const uint8_t *data, sprt_pack_t *p) {
  if (memcmp(data, SPRT_MAGIC, 4) != 0) return -1;
  p->version   = data[4];
  p->format    = data[5];
  p->width     = (uint16_t)data[6]  | ((uint16_t)data[7]  << 8);
  p->height    = (uint16_t)data[8]  | ((uint16_t)data[9]  << 8);
  p->count     = (uint16_t)data[10] | ((uint16_t)data[11] << 8);
  p->label_len = data[12];
  const uint32_t px = (uint32_t)p->width * p->height;
  switch (p->format) {
    case SPRT_FORMAT_1BPP:   p->pixel_bytes = (px + 7) / 8; break;
    case SPRT_FORMAT_GRAY8:  p->pixel_bytes = px;           break;
    case SPRT_FORMAT_RGB565: p->pixel_bytes = px * 2;       break;
    default: return -2;
  }
  p->stride = p->label_len + p->pixel_bytes;
  p->base   = data + 16;
  return 0;
}

// Label is null-padded; safe to printf as %s only if you copy <= label_len.
static inline const char *sprt_label(const sprt_pack_t *p, uint16_t i) {
  return (const char *)(p->base + (size_t)i * p->stride);
}

static inline const uint8_t *sprt_pixels(const sprt_pack_t *p, uint16_t i) {
  return p->base + (size_t)i * p->stride + p->label_len;
}

// Linear search by label (small N — fine for sprite packs).
static inline int sprt_find(const sprt_pack_t *p, const char *name) {
  for (uint16_t i = 0; i < p->count; i++) {
    const char *l = sprt_label(p, i);
    if (strncmp(l, name, p->label_len) == 0) return i;
  }
  return -1;
}

// ── Hit areas ──────────────────────────────────────────────────────
// Rectangles in sprite-local pixel space (origin = top-left of sprite).
typedef struct {
  uint16_t x, y, w, h;
  const char *name;
} sprt_hit_t;

typedef struct {
  uint16_t          sprite_idx;
  uint8_t           count;
  const sprt_hit_t *items;
} sprt_hit_set_t;

// Point-in-rect test against all hit sets for a sprite.
// Returns the hit index within the sprite's set, or -1 if no hit.
// Sets \`*out_name\` to the matched rect's name when non-null.
static inline int sprt_hit_test(const sprt_hit_set_t *sets, size_t n_sets,
                                uint16_t sprite_idx, int16_t x, int16_t y,
                                const char **out_name) {
  for (size_t s = 0; s < n_sets; s++) {
    if (sets[s].sprite_idx != sprite_idx) continue;
    for (uint8_t h = 0; h < sets[s].count; h++) {
      const sprt_hit_t *r = &sets[s].items[h];
      if (x >= (int16_t)r->x && x < (int16_t)(r->x + r->w) &&
          y >= (int16_t)r->y && y < (int16_t)(r->y + r->h)) {
        if (out_name) *out_name = r->name;
        return (int)h;
      }
    }
    return -1;
  }
  return -1;
}

// Canonical reader for the mochi-esp native pack. Kept in sync with
// firmware/main/mochi_pack.h in the repo (that file is the source of
// truth on-device; this copy is for the binding card / copy button).
const MOCHI_PARSER = `// mochi_pack.h — build-time sprite pack reader for mochi-esp
// Pack "MPK1" from SPRITE·FORGE (target: mochi-esp). Each entry's cell
// blob is byte-identical to a /devsprite/cell response, so bundled and
// fetched cells share one compositor::blit_two_plane path.
// See design/05-sprite-format.md + design/13-build-time-asset-packs.md.
#pragma once
#include <stdint.h>
#include <stddef.h>
#include <string.h>

typedef struct {
  uint16_t       cell_w, cell_h, count;
  uint8_t        label_len, has_mask;
  uint32_t       plane_bytes;   // ((cell_w+7)/8)*cell_h
  uint32_t       cell_bytes;    // 8 + (has_mask?2:1)*plane_bytes
  uint32_t       stride;        // label_len + cell_bytes
  const uint8_t *base;
} mpk_t;

static inline int mpk_open(const uint8_t *d, mpk_t *p) {
  if (memcmp(d, "MPK1", 4) != 0) return -1;
  if (d[4] != 1) return -2;
  p->cell_w    = (uint16_t)d[6]  | ((uint16_t)d[7]  << 8);
  p->cell_h    = (uint16_t)d[8]  | ((uint16_t)d[9]  << 8);
  p->count     = (uint16_t)d[10] | ((uint16_t)d[11] << 8);
  p->label_len = d[12];
  p->has_mask  = d[13] & 1;
  p->plane_bytes = (uint32_t)((p->cell_w + 7) / 8) * p->cell_h;
  p->cell_bytes  = 8u + (p->has_mask ? 2u : 1u) * p->plane_bytes;
  p->stride      = (uint32_t)p->label_len + p->cell_bytes;
  p->base        = d + 16;
  return 0;
}
static inline const char    *mpk_label(const mpk_t *p, uint16_t i) {
  return (const char *)(p->base + (size_t)i * p->stride);
}
static inline const uint8_t *mpk_cell(const mpk_t *p, uint16_t i) {
  return p->base + (size_t)i * p->stride + p->label_len;     // = a /devsprite/cell blob
}
static inline const uint8_t *mpk_ink(const mpk_t *p, uint16_t i) {
  return mpk_cell(p, i) + 8;
}
static inline const uint8_t *mpk_mask(const mpk_t *p, uint16_t i) {
  return p->has_mask ? mpk_cell(p, i) + 8 + p->plane_bytes : NULL;
}
static inline int mpk_find(const mpk_t *p, const char *name) {
  for (uint16_t i = 0; i < p->count; i++)
    if (strncmp(mpk_label(p, i), name, p->label_len) == 0) return (int)i;
  return -1;
}

// ── Tap zones (build-time scene contract; see <pack>_meta.h) ────────
typedef struct { uint16_t x, y, w, h; const char *name; } mpk_zone_t;
typedef struct { uint16_t sprite_idx; uint8_t count; const mpk_zone_t *items; } mpk_zone_set_t;
static inline int mpk_zone_test(const mpk_zone_set_t *sets, size_t n,
                                uint16_t idx, int16_t x, int16_t y,
                                const char **out) {
  for (size_t s = 0; s < n; s++) {
    if (sets[s].sprite_idx != idx) continue;
    for (uint8_t z = 0; z < sets[s].count; z++) {
      const mpk_zone_t *r = &sets[s].items[z];
      if (x >= (int16_t)r->x && x < (int16_t)(r->x + r->w) &&
          y >= (int16_t)r->y && y < (int16_t)(r->y + r->h)) {
        if (out) *out = r->name;
        return (int)z;
      }
    }
    return -1;
  }
  return -1;
}

// mpk_t pack; mpk_open(_binary_pets_mpk_bin_start, &pack);

// compositor::blit_two_plane(composite, W, H, mpk_ink(&pack, i),

// ───────────────────────────── hit area editor ─────────────────────

function HitAreaEditor({ sprite, hits, label, format, threshold, invert, effect, onChange, onClose }) {
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const [drawing, setDrawing] = useState(null); // {x1,y1,x2,y2} normalized
  const [containerW, setContainerW] = useState(320);

  const sw = sprite.width, sh = sprite.height;
  // Scale to fit container width, integer multiple for pixel-perfect look
  const baseScale = Math.max(1, Math.floor(containerW / sw));
  const scale = Math.min(baseScale, 16);
  const dW = sw * scale, dH = sh * scale;

  useEffect(() => {
    const update = () => {
      if (wrapRef.current) setContainerW(wrapRef.current.clientWidth);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  // Render the canvas
  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    c.width = dW;
    c.height = dH;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const processed = convertPreview(sprite, format, threshold, invert, effect);
    const off = document.createElement('canvas');
    off.width = sw; off.height = sh;
    off.getContext('2d').putImageData(processed, 0, 0);

    // Checker background
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, dW, dH);
    ctx.drawImage(off, 0, 0, dW, dH);

    // Pixel grid (faint, only if scale large enough)
    if (scale >= 6) {
      ctx.strokeStyle = 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = 1; x < sw; x++) {
        ctx.moveTo(x * scale + 0.5, 0);
        ctx.lineTo(x * scale + 0.5, dH);
      }
      for (let y = 1; y < sh; y++) {
        ctx.moveTo(0, y * scale + 0.5);
        ctx.lineTo(dW, y * scale + 0.5);
      }
      ctx.stroke();
    }

    // Existing hits
    ctx.lineWidth = 2;
    hits.forEach((h, idx) => {
      const x = h.x * dW, y = h.y * dH, w = h.w * dW, hgt = h.h * dH;
      ctx.fillStyle = 'rgba(244,63,94,0.18)';
      ctx.fillRect(x, y, w, hgt);
      ctx.strokeStyle = 'rgba(244,63,94,0.95)';
      ctx.strokeRect(x + 1, y + 1, w - 2, hgt - 2);
      // Index badge
      ctx.fillStyle = 'rgba(244,63,94,0.95)';
      ctx.fillRect(x, y, 16, 14);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px monospace';
      ctx.fillText(String(idx), x + 4, y + 10);
    });

    // In-progress draw
    if (drawing) {
      const x = Math.min(drawing.x1, drawing.x2) * dW;
      const y = Math.min(drawing.y1, drawing.y2) * dH;
      const w = Math.abs(drawing.x2 - drawing.x1) * dW;
      const hgt = Math.abs(drawing.y2 - drawing.y1) * dH;
      ctx.fillStyle = 'rgba(94,234,212,0.2)';
      ctx.fillRect(x, y, w, hgt);
      ctx.strokeStyle = 'rgba(94,234,212,1)';
      ctx.setLineDash([4, 4]);
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, hgt);
      ctx.setLineDash([]);
    }
  }, [sprite, hits, drawing, format, threshold, invert, effect, dW, dH, sw, sh, scale]);

  const ptToNorm = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    return { x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)) };
  };

  const onPointerDown = (e) => {
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    const p = ptToNorm(e);
    setDrawing({ x1: p.x, y1: p.y, x2: p.x, y2: p.y });
  };
  const onPointerMove = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const p = ptToNorm(e);
    setDrawing({ ...drawing, x2: p.x, y2: p.y });
  };
  const onPointerUp = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const x = Math.min(drawing.x1, drawing.x2);
    const y = Math.min(drawing.y1, drawing.y2);
    const w = Math.abs(drawing.x2 - drawing.x1);
    const h = Math.abs(drawing.y2 - drawing.y1);
    setDrawing(null);
    // Snap to integer pixels in sprite space
    const px = Math.round(x * sw);
    const py = Math.round(y * sh);
    const pw = Math.max(1, Math.round(w * sw));
    const ph = Math.max(1, Math.round(h * sh));
    if (pw < 2 && ph < 2) return; // ignore tap-without-drag
    const nx = px / sw, ny = py / sh, nw = pw / sw, nh = ph / sh;
    onChange([...hits, { x: nx, y: ny, w: nw, h: nh, name: `hit_${hits.length}` }]);
  };

  const updateHit = (i, patch) => {
    onChange(hits.map((h, j) => (j === i ? { ...h, ...patch } : h)));
  };
  const deleteHit = (i) => {
    onChange(hits.filter((_, j) => j !== i));
  };

  return (
    <div className="fixed inset-0 z-50 bg-zinc-950/95 backdrop-blur flex flex-col">
      <header className="border-b border-zinc-800 px-3 py-3 flex items-center justify-between">
        <div>
          <div className="text-[10px] text-zinc-600 uppercase tracking-wider">edit hit areas</div>
          <div className="pixel text-sm text-teal-300">{label}</div>
        </div>
        <button
          onClick={onClose}
          className="bg-zinc-800 text-zinc-200 px-3 py-1.5 text-xs hover:bg-zinc-700"
        >
          done
        </button>
      </header>

      <div className="flex-1 overflow-y-auto p-3 space-y-3">
        <div ref={wrapRef} className="space-y-2">
          <canvas
            ref={canvasRef}
            onPointerDown={onPointerDown}
            onPointerMove={onPointerMove}
            onPointerUp={onPointerUp}
            onPointerCancel={onPointerUp}
            style={{
              width: '100%',
              height: 'auto',
              imageRendering: 'pixelated',
              touchAction: 'none',
              cursor: 'crosshair',
              display: 'block',
              border: '1px solid #3f3f46',
            }}
          />
          <div className="text-[10px] text-zinc-500">
            drag to draw a hit area · {sw}×{sh}px sprite · {scale}× zoom
          </div>
        </div>

        <div className="space-y-2">
          <div className="text-[10px] text-zinc-500 uppercase tracking-wider">
            hit areas ({hits.length})
          </div>
          {hits.length === 0 ? (
            <div className="text-[11px] text-zinc-600 italic">no hit areas yet — drag on the canvas above</div>
          ) : (
            hits.map((h, i) => {
              const px = Math.round(h.x * sw);
              const py = Math.round(h.y * sh);
              const pw = Math.max(1, Math.round(h.w * sw));
              const ph = Math.max(1, Math.round(h.h * sh));
              return (
                <div key={i} className="border border-zinc-800 p-2 space-y-1.5">
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] text-rose-400 bg-rose-500/10 border border-rose-500/40 px-1.5 tabular-nums">
                      {i}
                    </span>
                    <input
                      type="text"
                      value={h.name}
                      onChange={(e) => updateHit(i, { name: e.target.value })}
                      className="flex-1 bg-zinc-900 border border-zinc-800 focus:border-teal-300/60 outline-none px-2 py-1 text-[12px] text-zinc-200"
                      placeholder="name"
                    />
                    <button
                      onClick={() => deleteHit(i)}
                      className="text-[10px] text-rose-400 hover:text-rose-300 border border-rose-500/40 hover:border-rose-400 px-2 py-1"
                    >
                      del
                    </button>
                  </div>
                  <div className="text-[10px] text-zinc-500 font-mono tabular-nums">
                    x={px} y={py} w={pw} h={ph}
                    <span className="text-zinc-700"> · </span>
                    nx={h.x.toFixed(3)} ny={h.y.toFixed(3)} nw={h.w.toFixed(3)} nh={h.h.toFixed(3)}
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────── main ─────────────────────────────

function App() {
  const [imgEl, setImgEl] = useState(null);
  const [imageURL, setImageURL] = useState(null);
  const [filename, setFilename] = useState('');

  const [cols, setCols] = useState(4);
  const [rows, setRows] = useState(4);
  const [marginTop, setMarginTop] = useState(5);
  const [marginRight, setMarginRight] = useState(5);
  const [marginBottom, setMarginBottom] = useState(5);
  const [marginLeft, setMarginLeft] = useState(5);
  const [hGutter, setHGutter] = useState(5);
  const [vGutter, setVGutter] = useState(5);

  // Target: 'sprt' = generic ESP32/Arduino pack; 'mochi' = mochi-esp
  // native build-time pack (MPK1, device 2-plane cells). See
  // design/13-build-time-asset-packs.md.
  const [target, setTarget] = useState('mochi');
  // Preset: bulk-applies a known-good config for a given mochi-esp
  // pack flavour. 'scene' = 200×200 background pack with named tap
  // zones; 'pet' = 96×96 expression pack on a magenta sheet; 'ui' =
  // 32×32 chrome glyphs (icons, status). Picked once when starting
  // a new export — fine to tweak afterwards.
  const [preset, setPreset] = useState('scene');
  // mochi-esp mask source: where transparency comes from.
  const [maskSource, setMaskSource] = useState('alpha'); // 'alpha' | 'white' | 'chroma' | 'none'
  const [paperStroke, setPaperStroke] = useState(false);  // 1px paper halo (matches server STROKE)
  // Chroma key for 'chroma' maskSource: any pixel within chromaTol of
  // chromaHex (Chebyshev distance per channel) reads as background.
  // Useful for pet sprites exported on a flat coloured cell border
  // (e.g. magenta #ff00ff sheets) — neither alpha nor near-white
  // catch them.
  const [chromaHex, setChromaHex] = useState('#ff00ff');
  const [chromaTol, setChromaTol] = useState(24);
  // When true, sheet + thumbnail previews honour the mask plane:
  // transparent pixels render with alpha=0 so the page's checker
  // shows through. Off by default — masked sprites on a white sheet
  // can be hard to count, but the toggle is what makes a chroma key
  // selection legible. Doesn't affect the binary export.
  const [showAlpha, setShowAlpha] = useState(true);

  const [outSize, setOutSize] = useState(200);
  const [format, setFormat] = useState('1bpp');
  const [threshold, setThreshold] = useState(79);
  const [invert, setInvert] = useState(false);
  const [smoothing, setSmoothing] = useState(false);
  const [labelMaxLen, setLabelMaxLen] = useState(16);

  // mochi-esp cells are always 200px tall at most; force a sensible
  // ink threshold up front since the device is 1-bit.
  const isMochi = target === 'mochi';

  // Effect: 'none' | 'fs' | 'atkinson' | 'bayer4' | 'bayer8' | 'screen'
  const [effectKind, setEffectKind] = useState('screen');
  const [serpentine, setSerpentine] = useState(true);   // for error-diffusion
  const [bayerStrength, setBayerStrength] = useState(80); // 0..100 → 0..1
  const [screenAngle, setScreenAngle] = useState(139);
  const [screenSpacing, setScreenSpacing] = useState(2);
  const [screenContrast, setScreenContrast] = useState(38); // 0..100 → 0..1

  const effect = useMemo(() => ({
    kind: effectKind,
    serpentine,
    strength: bayerStrength / 100,
    angle: screenAngle,
    spacing: screenSpacing,
    contrast: screenContrast / 100,
  }), [effectKind, serpentine, bayerStrength, screenAngle, screenSpacing, screenContrast]);

  const [labels, setLabels] = useState([]);
  const [hits, setHits] = useState([]);          // hits[i] = [{x,y,w,h,name}] in normalized coords
  const [editingIdx, setEditingIdx] = useState(null);
  const [showLayout, setShowLayout] = useState(true);
  const [showC, setShowC] = useState(false);
  const [copied, setCopied] = useState(false);
  const [overlayOn, setOverlayOn] = useState(true);
  const [sheetCols, setSheetCols] = useState(null);  // null = follow source cols
  const [showIndices, setShowIndices] = useState(false);
  const effectiveSheetCols = sheetCols ?? cols;

  const [error, setError] = useState(null);
  const fileInputRef = useRef(null);

  // Derive sprite size from cols/rows, margins, and gutters.
  //   usableW = imgW - marginL - marginR
  //   spriteW = (usableW - (cols-1)*hGutter) / cols
  const layout = useMemo(() => {
    if (!imgEl || cols <= 0 || rows <= 0) {
      return { cols: 0, rows: 0, count: 0, spriteW: 0, spriteH: 0, fits: false };
    }
    const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
    const usableW = iw - marginLeft - marginRight;
    const usableH = ih - marginTop - marginBottom;
    const spriteW = (usableW - (cols - 1) * hGutter) / cols;
    const spriteH = (usableH - (rows - 1) * vGutter) / rows;
    const fits = spriteW > 0 && spriteH > 0;
    return {
      cols, rows, count: cols * rows,
      spriteW: fits ? spriteW : 0,
      spriteH: fits ? spriteH : 0,
      fits,
    };
  }, [imgEl, cols, rows, marginTop, marginRight, marginBottom, marginLeft, hGutter, vGutter]);

  // ── Presets ────────────────────────────────────────────────────────
  //
  // Bulk-apply a known-good config for a given mochi-esp pack
  // flavour. Each preset is the full set of knobs we'd otherwise have
  // to set by hand — output size, transparency mode, dithering,
  // threshold, default labels.
  //
  // Labels: a baseline list that's used to seed label slots up to
  // layout.count. Extra grid cells beyond the list fall back to
  // `sprite_NN`. Keep these in lock-step with the firmware: pet
  // names mirror SPRITE_NAMES in main/mood.c; ui names mirror the
  // status-bar icon set.
  const PRESETS = {
    scene: {
      label: 'scene (200×200, MPK1)',
      target: 'mochi',
      outSize: 200,
      maskSource: 'none',         // backgrounds are fully opaque
      paperStroke: false,
      effectKind: 'screen',       // screen-tone reads well at scene scale
      threshold: 79,
      smoothing: false,
      labels: [],                 // scene labels are author-named per-pack
    },
    pet: {
      label: 'pet (96×96, MPK1)',
      target: 'mochi',
      outSize: 96,
      // Sheet/grid for the canonical 18-cell pet export. 6×3 with a
      // wide margin-bottom (70) accounts for the export tool's
      // signature line; horizontal gutter 15 separates cells; vertical
      // gutter 6 is enough to bleed the chroma border between rows.
      cols: 6, rows: 3,
      marginTop: 60, marginRight: 60, marginBottom: 70, marginLeft: 60,
      hGutter: 15, vGutter: 6,
      // Pet sheets ship on a flat green chroma — green is far enough
      // from neutral pet line work that the per-channel Chebyshev
      // distance stays uncontaminated by the line-screen halftone
      // effect (which only modulates the ink plane, not the mask).
      maskSource: 'chroma',
      chromaHex: '#03f805',
      chromaTol: 24,
      paperStroke: true,          // halo to keep pet distinct from scene ink
      effectKind: 'screen',
      screenAngle: 139,
      screenSpacing: 2,
      screenContrast: 61,
      threshold: 105,
      smoothing: true,
      // Canonical pet-v1 cell layout — see the guide SVG served by
      // mochi.val.run (6×3, row-major). Names line up with
      // SPRITE_NAMES in firmware/main/mood.c so mpk_find resolves
      // each expression directly.
      labels: [
        // row 0
        'neutral', 'happy',  'blushing', 'excited',  'playful',   'cheerful_wave',
        // row 1
        'hungry',  'eating', 'tired',    'sleeping', 'waking_up', 'comforted',
        // row 2
        'sad',     'lonely', 'curious',  'thinking', 'surprised', 'goodbye',
      ],
    },
    ui: {
      label: 'ui chrome (32×32, MPK1)',
      target: 'mochi',
      outSize: 32,
      maskSource: 'chroma',
      chromaHex: '#03f805',
      chromaTol: 24,
      paperStroke: false,
      effectKind: 'none',
      threshold: 128,
      smoothing: false,
      // Common chrome glyphs — extend as the device's UI vocabulary
      // grows. Names line up with the existing care-icon set.
      labels: [
        'food', 'heart', 'ball', 'sparkle',
        'battery', 'wifi', 'voice', 'home',
      ],
    },
  };
  const applyPreset = useCallback((key) => {
    const p = PRESETS[key];
    if (!p) return;
    setPreset(key);
    if (p.target)        setTarget(p.target);
    if (p.outSize)       setOutSize(p.outSize);
    if (p.maskSource)    setMaskSource(p.maskSource);
    if (p.chromaHex)     setChromaHex(p.chromaHex);
    if (p.chromaTol != null) setChromaTol(p.chromaTol);
    if (p.paperStroke != null) setPaperStroke(p.paperStroke);
    if (p.effectKind)    setEffectKind(p.effectKind);
    if (p.screenAngle != null)    setScreenAngle(p.screenAngle);
    if (p.screenSpacing != null)  setScreenSpacing(p.screenSpacing);
    if (p.screenContrast != null) setScreenContrast(p.screenContrast);
    if (p.threshold != null) setThreshold(p.threshold);
    if (p.smoothing != null) setSmoothing(p.smoothing);
    if (p.cols != null)      setCols(p.cols);
    if (p.rows != null)      setRows(p.rows);
    if (p.marginTop != null)    setMarginTop(p.marginTop);
    if (p.marginRight != null)  setMarginRight(p.marginRight);
    if (p.marginBottom != null) setMarginBottom(p.marginBottom);
    if (p.marginLeft != null)   setMarginLeft(p.marginLeft);
    if (p.hGutter != null)      setHGutter(p.hGutter);
    if (p.vGutter != null)      setVGutter(p.vGutter);
    if (Array.isArray(p.labels)) {
      // Seed labels for known slots; leave extras as sprite_NN. We
      // intentionally overwrite existing labels here so flipping
      // presets gives consistent output without manual cleanup.
      setLabels((prev) => {
        const n = Math.max(prev.length, p.labels.length);
        return Array.from({ length: n }, (_, i) =>
          p.labels[i] ?? `sprite_${String(i).padStart(2, '0')}`);
      });
    }
  }, []);

  // keep labels array in sync with grid count
  useEffect(() => {
    const n = layout.count;
    setLabels((prev) =>
      Array.from({ length: n }, (_, i) => prev[i] ?? `sprite_${String(i).padStart(2, '0')}`)
    );
  }, [layout.count]);

  // keep hits array in sync with grid count
  useEffect(() => {
    const n = layout.count;
    setHits((prev) => Array.from({ length: n }, (_, i) => prev[i] ?? []));
  }, [layout.count]);

  const setSpriteHits = useCallback((idx, newHits) => {
    setHits((prev) => {
      const next = [...prev];
      next[idx] = newHits;
      return next;
    });
  }, []);

  const handleFile = useCallback((file) => {
    setError(null);
    if (!file) { setError('No file received from picker.'); return; }
    const ext = (file.name || '').match(/\.([^.]+)$/)?.[1]?.toLowerCase() || '';
    const looksLikeImage =
      (file.type && file.type.startsWith('image/')) ||
      ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp', 'avif', 'heic', 'heif'].includes(ext);
    if (!looksLikeImage) {
      setError(`Unsupported file: "${file.name}" type=${file.type || '?'} size=${file.size}B`);
      return;
    }
    setFilename((file.name || 'sprites').replace(/\.[^.]+$/, ''));

    // FileReader → data URL is more reliable than blob: URLs in sandboxed iframes
    const reader = new FileReader();
    reader.onerror = () => setError(`FileReader: ${reader.error?.message || 'unknown error'}`);
    reader.onload = (e) => {
      const dataURL = e.target.result;
      const img = new Image();
      img.onload = () => {
        if (!img.naturalWidth || !img.naturalHeight) {
          setError(`Image decoded but has zero dimensions (${file.size}B, ${file.type || '?'}).`);
          return;
        }
        setImgEl(img);
        setImageURL(dataURL);
      };
      img.onerror = async () => {
        // Sniff actual file format by reading magic bytes
        try {
          const buf = await file.slice(0, 16).arrayBuffer();
          const b = new Uint8Array(buf);
          const hex = Array.from(b).map(x => x.toString(16).padStart(2, '0')).join(' ');
          let detected = 'unknown';
          if (b[0] === 0x89 && b[1] === 0x50 && b[2] === 0x4e && b[3] === 0x47) detected = 'PNG';
          else if (b[0] === 0xff && b[1] === 0xd8 && b[2] === 0xff) detected = 'JPEG';
          else if (b[0] === 0x47 && b[1] === 0x49 && b[2] === 0x46) detected = 'GIF';
          else if (b[0] === 0x52 && b[1] === 0x49 && b[2] === 0x46 && b[3] === 0x46) detected = 'RIFF/WebP';
          else if (b[4] === 0x66 && b[5] === 0x74 && b[6] === 0x79 && b[7] === 0x70) {
            const brand = String.fromCharCode(b[8], b[9], b[10], b[11]);
            detected = `ISOBMFF (brand=${brand}) — likely HEIC/HEIF/AVIF`;
          }
          setError(
            `Decode failed. Browser cannot render this image.\n` +
            `• File: ${file.name} (${file.size}B)\n` +
            `• Reported type: ${file.type || 'none'}\n` +
            `• Detected from bytes: ${detected}\n` +
            `• Magic: ${hex}` +
            (detected.startsWith('ISOBMFF')
              ? `\n→ This is a HEIC/HEIF photo. Export as PNG or JPEG from Photos (Share → Save to Files → choose PNG, or Settings → Camera → Formats → Most Compatible).`
              : '')
          );
        } catch (err) {
          setError(`Decode failed (${file.size}B ${file.type || '?'}). Could not sniff bytes: ${err.message}`);
        }
      };
      img.src = dataURL;
    };
    reader.readAsDataURL(file);
  }, []);

  const pickFile = useCallback(() => {
    if (fileInputRef.current) {
      fileInputRef.current.value = ''; // re-pick same file works
      fileInputRef.current.click();
    }
  }, []);

  // extract raw sprites at outSize × outSize using derived geometry
  const sprites = useMemo(() => {
    if (!imgEl || !layout.fits || layout.count === 0) return [];
    const { spriteW, spriteH } = layout;

    const result = [];
    const tmp = document.createElement('canvas');
    tmp.width = outSize;
    tmp.height = outSize;
    const ctx = tmp.getContext('2d');

    for (let r = 0; r < layout.rows; r++) {
      for (let c = 0; c < layout.cols; c++) {
        ctx.imageSmoothingEnabled = smoothing;
        ctx.imageSmoothingQuality = 'high';
        ctx.clearRect(0, 0, outSize, outSize);
        const sx = marginLeft + c * (spriteW + hGutter);
        const sy = marginTop + r * (spriteH + vGutter);
        ctx.drawImage(imgEl, sx, sy, spriteW, spriteH, 0, 0, outSize, outSize);
        result.push(ctx.getImageData(0, 0, outSize, outSize));
      }
    }
    return result;
  }, [imgEl, layout, marginTop, marginLeft, hGutter, vGutter, outSize, smoothing]);

  // preview thumbnails reflect the chosen output format
  // mochi-esp is always 1-bit on the device; preview as 1bpp so the
  // thumbnails + threshold reflect what gets packed (the rgb565 sim
  // would be misleading here).
  const previewFormat = isMochi ? '1bpp' : format;

  // Per-sprite opacity buffers for the mochi target. Recomputed
  // whenever the chroma / paper-stroke knobs change so the previews
  // reflect the export.
  const previewMasks = useMemo(() => {
    if (!isMochi || !showAlpha) return null;
    return sprites.map((s) => buildOpacityBuffer(s, { maskSource, chromaHex, chromaTol, paperStroke }));
  }, [isMochi, showAlpha, sprites, maskSource, chromaHex, chromaTol, paperStroke]);

  const previewURLs = useMemo(
    () => sprites.map((s, i) => imageDataToURL(convertPreview(s, previewFormat, threshold, invert, effect, previewMasks ? previewMasks[i] : null))),
    [sprites, previewFormat, threshold, invert, effect, previewMasks]
  );

  const { pixelBytes, perEntry, totalBytes } = useMemo(() => {
    if (isMochi) {
      // Device 2-plane cell: 8-byte header + ink + mask, rows byte-aligned.
      const rowBytes = (outSize + 7) >> 3;
      const planeBytes = rowBytes * outSize;
      const cellBytes = 8 + planeBytes * 2;
      const pe = cellBytes + labelMaxLen;
      return { pixelBytes: cellBytes, perEntry: pe, totalBytes: 16 + layout.count * pe };
    }
    const px = outSize * outSize;
    const pb = format === '1bpp' ? Math.ceil(px / 8) : format === 'gray8' ? px : px * 2;
    const pe = pb + labelMaxLen;
    return { pixelBytes: pb, perEntry: pe, totalBytes: 16 + layout.count * pe };
  }, [isMochi, outSize, format, labelMaxLen, layout.count]);

  const buildBinary = useCallback(() => {
    const enc = new TextEncoder();

    if (isMochi) {
      // MPK1: device 2-plane cell pack (see design/13-build-time-asset-packs.md).
      const buf = new Uint8Array(totalBytes);
      const dv = new DataView(buf.buffer);
      buf[0] = 0x4d; buf[1] = 0x50; buf[2] = 0x4b; buf[3] = 0x31; // "MPK1"
      buf[4] = 1;                       // version
      buf[5] = 0;                       // format: 2-plane cell entries
      dv.setUint16(6, outSize, true);   // cell_w LE
      dv.setUint16(8, outSize, true);   // cell_h LE
      dv.setUint16(10, sprites.length, true);
      buf[12] = labelMaxLen;
      buf[13] = 0x01;                   // flags: mask plane present
      // 14..15 reserved (zero)

      let off = 16;
      for (let i = 0; i < sprites.length; i++) {
        const lb = enc.encode(labels[i] || '');
        const n = Math.min(lb.length, labelMaxLen);
        for (let j = 0; j < n; j++) buf[off + j] = lb[j];
        off += labelMaxLen;
        const cell = packCellMochi(sprites[i], { threshold, invert, effect, maskSource, paperStroke, chromaHex, chromaTol });
        buf.set(cell, off);
        off += pixelBytes;             // == 8 + 2*planeBytes
      }
      return buf;
    }

    // SPRT: generic ESP32 / Arduino pack.
    const buf = new Uint8Array(totalBytes);
    const dv = new DataView(buf.buffer);
    buf[0] = 0x53; buf[1] = 0x50; buf[2] = 0x52; buf[3] = 0x54; // "SPRT"
    buf[4] = 1; // version
    buf[5] = format === '1bpp' ? 0 : format === 'gray8' ? 1 : 2;
    dv.setUint16(6, outSize, true);
    dv.setUint16(8, outSize, true);
    dv.setUint16(10, sprites.length, true);
    buf[12] = labelMaxLen;
    // 13–15 reserved (zero)

    let off = 16;
    for (let i = 0; i < sprites.length; i++) {
      const lb = enc.encode(labels[i] || '');
      const n = Math.min(lb.length, labelMaxLen);
      for (let j = 0; j < n; j++) buf[off + j] = lb[j];
      off += labelMaxLen;
      const pix = packPixels(sprites[i], format, threshold, invert, effect);
      for (let j = 0; j < pix.length; j++) buf[off + j] = pix[j];
      off += pixelBytes;
    }
    return buf;
  }, [isMochi, sprites, labels, format, outSize, labelMaxLen, threshold, invert, effect, maskSource, paperStroke, chromaHex, chromaTol, pixelBytes, totalBytes]);

  const handleDownload = useCallback(() => {
    const buf = buildBinary();
    const blob = new Blob([buf], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = isMochi
      ? `${filename || 'sprites'}_${outSize}.mpk.bin`
      : `${filename || 'sprites'}_${outSize}_${format}.bin`;
    a.click();
    URL.revokeObjectURL(url);
  }, [buildBinary, filename, outSize, format, isMochi]);

  const copyParser = useCallback(async () => {
    try {
      await navigator.clipboard.writeText(isMochi ? MOCHI_PARSER : C_PARSER);
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch {}
  }, [isMochi]);

  // ─── Sheet PNG ────────────────────────────────────────────────────
  // Built lazily for inline preview; downloaded on demand.
  const sheetPNG = useMemo(() => {
    if (!sprites.length) return null;
    const canvas = buildSheetCanvas(sprites, previewFormat, threshold, invert, effect, {
      cols: effectiveSheetCols, hits, drawHits: true, drawIndices: showIndices,
      masks: previewMasks, checker: !!previewMasks,
    });
    return canvas ? canvas.toDataURL('image/png') : null;
  }, [sprites, previewFormat, threshold, invert, effect, hits, effectiveSheetCols, showIndices, previewMasks]);

  const handleDownloadSheet = useCallback(() => {
    if (!sprites.length) return;
    // Clean export: no hit overlays, no indices, no debug borders
    const canvas = buildSheetCanvas(sprites, previewFormat, threshold, invert, effect, {
      cols: effectiveSheetCols, hits, drawHits: false, drawIndices: false, drawBorders: false,
    });
    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${filename || 'sprites'}_${outSize}_${format}_sheet.png`;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  }, [sprites, previewFormat, threshold, invert, effect, hits, effectiveSheetCols, filename, outSize]);

  // ─── Meta header generation ──────────────────────────────────────
  // Same structure for both targets; only the included reader, the
  // type names, and the set-table symbol differ. For mochi-esp the
  // zone tables ARE a build-time scene contract (design/13).
  const metaHeader = useMemo(() => {
    if (!sprites.length) return null;
    const packName = cIdent(filename || 'sprites');
    const totalHits = hits.reduce((acc, hs) => acc + (hs?.length || 0), 0);

    const m = isMochi
      ? { include: 'mochi_pack.h', rect: 'mpk_zone_t',  set: 'mpk_zone_set_t',
          arr: 'ZONES', kind: 'tap zones (build-time scene contract)' }
      : { include: 'sprite_pack.h', rect: 'sprt_hit_t', set: 'sprt_hit_set_t',
          arr: 'HITS',  kind: 'hit areas' };

    const fmtLabel = isMochi ? 'mochi 2-plane (MPK1)' : format;
    const lines = [];
    lines.push(`// Generated by SPRITE·FORGE — metadata for pack "${filename || 'sprites'}"`);
    lines.push(`// ${sprites.length} sprites · ${outSize}×${outSize} ${fmtLabel} · ${totalHits} ${m.kind}`);
    lines.push(`#pragma once`);
    lines.push(`#include "${m.include}"`);
    lines.push('');
    lines.push(`// Sprite indices (compile-time constants by label)`);
    labels.forEach((lab, i) => {
      lines.push(`#define ${packName}_SPRITE_${cIdent(lab)} ${i}u`);
    });
    lines.push('');

    if (totalHits === 0) {
      lines.push(`// No ${m.kind} defined.`);
      lines.push(`static const ${m.set} ${packName}_${m.arr}[1] = { {0, 0, NULL} };`);
      lines.push(`#define ${packName}_${m.arr}_COUNT 0u`);
    } else {
      // Emit per-sprite rect arrays, then a set table.
      const sets = [];
      hits.forEach((hs, i) => {
        if (!hs || hs.length === 0) return;
        const lab = cIdent(labels[i] || `sprite_${i}`);
        const arrName = `${packName}_${m.arr}_${lab}`;
        lines.push(`static const ${m.rect} ${arrName}[${hs.length}] = {`);
        hs.forEach((h) => {
          const x = Math.round(h.x * outSize);
          const y = Math.round(h.y * outSize);
          const w = Math.max(1, Math.round(h.w * outSize));
          const ht = Math.max(1, Math.round(h.h * outSize));
          // Sanitize the name for C string content (no quotes/newlines)
          const safeName = (h.name || `hit_${i}`).replace(/[\\"\n\r]/g, '_');
          lines.push(`  { ${x.toString().padStart(3)}, ${y.toString().padStart(3)}, ${w.toString().padStart(3)}, ${ht.toString().padStart(3)}, "${safeName}" },`);
        });
        lines.push(`};`);
        sets.push({ idx: i, count: hs.length, arrName });
      });
      lines.push('');
      lines.push(`static const ${m.set} ${packName}_${m.arr}[${sets.length}] = {`);
      sets.forEach((s) => {
        lines.push(`  { ${s.idx}, ${s.count}, ${s.arrName} },`);
      });
      lines.push(`};`);
      lines.push(`#define ${packName}_${m.arr}_COUNT ${sets.length}u`);
    }
    lines.push('');
    return lines.join('\n');
  }, [isMochi, sprites.length, labels, hits, filename, outSize, format]);

  const handleDownloadMeta = useCallback(() => {
    if (!metaHeader) return;
    const blob = new Blob([metaHeader], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${filename || 'sprites'}_meta.h`;
    a.click();
    URL.revokeObjectURL(url);
  }, [metaHeader, filename]);

  // (overlay geometry now derived directly in JSX from state — no useMemo needed)

  return (
    <div className="min-h-screen bg-zinc-950 text-zinc-100 scanline">
      <style>{FONTS}</style>

      {editingIdx !== null && sprites[editingIdx] && (
        <HitAreaEditor
          sprite={sprites[editingIdx]}
          hits={hits[editingIdx] || []}
          label={labels[editingIdx] || `sprite_${editingIdx}`}
          format={previewFormat}
          threshold={threshold}
          invert={invert}
          effect={effect}

      <main className="mx-auto max-w-3xl p-3 sm:p-4 pb-32 space-y-3">

          {!imgEl ? (
            <button
              type="button"

                </span>
              </div>
              <div className="relative inline-block max-w-full checker">
                <img src={imageURL} alt="" className="block max-w-full h-auto" />

                  <svg
                    className="absolute inset-0 w-full h-full pointer-events-none"
                    viewBox={`0 0 ${imgEl.naturalWidth} ${imgEl.naturalHeight}`}
                    preserveAspectRatio="none"
                  >
                    {/* outer margins (cropped out) */}
                    {marginTop > 0 && <rect x="0" y="0" width={imgEl.naturalWidth} height={marginTop} fill="rgba(244,63,94,0.15)" />}

                    {marginRight > 0 && <rect x={imgEl.naturalWidth - marginRight} y="0" width={marginRight} height={imgEl.naturalHeight} fill="rgba(244,63,94,0.15)" />}

                    {/* sprite cells (teal) + gutters (amber between) */}
                    {Array.from({ length: layout.rows }, (_, r) =>
                      Array.from({ length: layout.cols }, (_, c) => {
                        const x = marginLeft + c * (layout.spriteW + hGutter);
                        const y = marginTop + r * (layout.spriteH + vGutter);
                        const stroke = Math.max(1, imgEl.naturalWidth / 600);
                        const dash = imgEl.naturalWidth / 200;
                        return (
                          <g key={`${r}-${c}`}>
                            <rect
                              x={x} y={y}
                              width={layout.spriteW} height={layout.spriteH}
                              fill="none" stroke="#5eead4" strokeWidth={stroke}
                              strokeDasharray={`${dash} ${dash / 2}`}
                            />
                            {/* horizontal gutter after this column (except last) */}
                            {hGutter > 0 && c < layout.cols - 1 && (
                              <rect
                                x={x + layout.spriteW} y={y}
                                width={hGutter} height={layout.spriteH}
                                fill="rgba(251,191,36,0.15)"
                              />
                            )}
                            {/* vertical gutter after this row (except last) */}
                            {vGutter > 0 && r < layout.rows - 1 && (
                              <rect
                                x={x} y={y + layout.spriteH}
                                width={layout.spriteW} height={vGutter}

                <span className="text-amber-400/80">amber ▒</span> gutter
                <span className="text-zinc-700"> · </span>

            </div>

{isMochi ? MOCHI_PARSER : C_PARSER}

                    {' '}<a href="https://github.com/christopherdebeer/mochi-esp/blob/main/design/13-build-time-asset-packs.md" className="text-teal-300/80 hover:underline underline-offset-2">design/13</a>.
                  </>
                ) : (
                  <>
                    Embed the .bin with <span className="text-teal-300/80">xxd -i sprites.bin {'>'} sprites.h</span> for PROGMEM,
                    or read from SPIFFS / LittleFS / SD on boot.
                  </>
                )}
              </div>
            </div>
          )}
        </Card>

      </main>

      {/* sticky bottom action bar */}
      <div className="fixed bottom-0 inset-x-0 border-t border-zinc-800 bg-zinc-950/95 backdrop-blur z-30">
        <div className="mx-auto max-w-3xl px-3 sm:px-4 py-3 flex items-center gap-3">
          <div className="flex-1 text-[11px] min-w-0">
            <div className="text-zinc-600 uppercase tracking-wider text-[9px]">output ▸</div>
            <div className="text-teal-300 font-bold tabular-nums truncate">
              {totalBytes.toLocaleString()} B
              <span className="text-zinc-500 font-normal"> · {sprites.length || 0} sprites · {isMochi ? 'mpk1' : format}</span>
            </div>
          </div>
          <button
            onClick={handleDownload}
            disabled={!imgEl}
            className="bg-teal-300 text-zinc-950 px-4 sm:px-5 py-2.5 font-bold text-sm disabled:bg-zinc-800 disabled:text-zinc-600 active:bg-teal-400 flex items-center gap-2 shrink-0"
          >
            <Download size={15} strokeWidth={2.5} />
            {isMochi ? 'MPK.BIN' : 'PACK.BIN'}
          </button>
        </div>
      </div>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
