# Managed components from the ESP-IDF Component Registry.
#
# joltwallet/littlefs — LittleFS port for ESP-IDF. Used by the
# sprite-cache layer (firmware/main/sprite_cache.{cpp,h}) to mount
# the 'storage' partition (~4 MB at 0x410000; see partitions.csv)
# we can stash decoded sprite payloads in across reboots.
#
# Without this, every cold boot re-fetches scene + icons + pet
# expressions over HTTPS (~22 s of boot time before first render).
# With it, we ETag-check at boot and only re-fetch on changes.

dependencies:
  joltwallet/littlefs: "^1.14.0"

  # M9 — voice direct-to-OpenAI Realtime over WebRTC.
  #
  # esp_peer is the WebRTC PeerConnection itself (DTLS, SRTP, ICE,
  # SDP). Upstream `openai_demo` in esp-webrtc-solution layers
  # esp_webrtc + av_render + esp_capture + media_lib_utils on top;
  # we drive esp_peer directly instead. See firmware/components/README
  # § "Path choice" and design/01-bring-up-plan.md § M9 for why.
  #
  # codec_board (vendored under firmware/components/) brings in
  # esp_codec_dev transitively at the right version, so we don't
  # pin it here.
  espressif/esp_peer: "^1.4.1"

  # Opus decode for playback of OpenAI Realtime audio. Our SDP offers
  # Opus@24000/mono (matches mochi-val's audio.output.format hint to
  # the model). on_audio_data delivers Opus-encoded frames; this
  # component decodes them to PCM16 we can hand to esp_codec_dev_write.
  # Registry-only, no extra deps beyond IDF.
  espressif/esp_audio_codec: "^2.5.0"

  # M9.f.3 — software-reference acoustic echo cancellation.
  #
  # esp-sr ships the `aec_create` / `aec_process` API our voice_aec
  # module binds to (see firmware/main/voice/voice_aec.{c,h}). Bigger
  # than it looks — pulls AFE + NS + AGC + VAD + model loaders even
  # if we only call the AEC. Cost vs benefit is justified: single-mic
  # software-reference AEC is the only path to barge-in on the
  # Waveshare board (no ES7210 hardware ref channel; see
  # design/07-voice-architecture.md § "Software-reference AEC scaffold").
  espressif/esp-sr: "^2.4.4"

  # v0.1.6 — LVGL for the dev_menu wheel.
  #
  # Provides Info/Actions/WifiModal screens with bigger fonts,
  # scrollable lists, and proper button hit-tracking. We bind LVGL
  # to the existing Waveshare 1.54" e-paper via a 1bpp flush_cb
  # in lvgl_port.{cpp,h}; touch is bridged through the same
  # `touch::wait_event` queue main.cpp uses, polled non-blocking
  # in the indev read_cb.
  #
  # Monochrome 1bpp (LV_COLOR_DEPTH=1) keeps the framebuffer at
  # 200×200/8 = 5 KB; widget workspace in PSRAM via LVGL's mem
  # hooks. Refresh policy is hand-rolled inside the flush_cb:
  # partials by default, full clear-and-redraw every Nth update
  # to clear ghost. LVGL doesn't model that, but its dirty-rect
  # bookkeeping at least lets us suppress refresh entirely when
  # nothing changed.
  #
  # Only the dev_menu screens use LVGL today. The Live pet render,
  # boot splash, and provisioning paths stay on the bare epaper_driver
  # / epd_ui draw helpers — they're infrequent and the existing code
  # works.
  lvgl/lvgl: "^9.2.0"
